<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DigiPlay Security - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-body">
    <div class="form-card login-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="brand" style="justify-content: center; font-size: 2.2rem;">
                <span class="brand-icon">✦</span> DigiPlay
            </div>
            <p style="color: var(--text-secondary); margin-top: 0.5rem; font-weight: 600; letter-spacing: 1px;">SYSTEM
                ADMINISTRATION</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Admin Access Key</label>
                <input type="text" name="username" class="form-control">
            </div>
            <div class="form-group" style="margin-bottom: 2.5rem;">
                <label>Secure Passphrase</label>
                <input type="password" name="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; font-size: 1.1rem; padding: 1rem 0;">Authenticate Session</button>
        </form>
    </div>
</body>

</html>
